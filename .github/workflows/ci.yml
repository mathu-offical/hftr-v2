name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - name: Build web app
        run: pnpm --filter @hftr/web build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ''
          CLERK_SECRET_KEY: ''

      # Credentialed Alpaca/LLM smoke is opt-in (never commit secrets).
      # Set repository secrets + workflow_dispatch when operators want venue smoke.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply migrations against empty Postgres
        run: |
          for f in packages/db/migrations/*.sql; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Install Playwright Chromium
        run: pnpm --filter @hftr/web exec playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: pnpm --filter @hftr/web test:e2e
        env:
          CI: true
          DEV_AUTH_BYPASS: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ''
          CLERK_SECRET_KEY: ''

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations against empty Postgres (reproducibility gate G0)
        run: |
          for f in packages/db/migrations/*.sql; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          PGPASSWORD: postgres
